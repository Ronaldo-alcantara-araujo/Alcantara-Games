<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Alcantara Games</title>
<meta name="theme-color" content="#050505">
<link rel="manifest" href="manifest.json">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Inter:wght@400;600;700;800&display=swap');

:root{
  --bg:#050505; --panel:#0d0d0d; --panel2:#101010; --gold:#d4af37; --text:#e5e5e5; --muted:#8f96a3;
}
*{-webkit-tap-highlight-color:transparent;box-sizing:border-box}
body{
  margin:0;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
}
.font-usarmy{font-family:'Black Ops One',cursive;letter-spacing:.05em}
.hidden{display:none!important}
.app{max-width:760px;margin:0 auto;padding:14px 14px 24px}
.hero{
  text-align:center;padding:16px 10px 8px;
}
.logo-wrap{
  width:94px;height:94px;margin:0 auto 10px;border-radius:999px;overflow:hidden;
  border:2px solid rgba(212,175,55,.28);
  box-shadow:0 0 18px rgba(212,175,55,.18), inset 0 0 10px rgba(212,175,55,.08);
  background:#111;
}
.logo-wrap img{width:100%;height:100%;object-fit:cover}
.hero h1{margin:0;color:var(--gold);font-size:26px;line-height:1}
.hero p{margin:6px 0 0;font-size:12px;color:var(--muted);letter-spacing:.08em}

.view{display:none}
.view.active{display:block}

.action-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:14px;
}
.action-btn{
  position:relative;overflow:hidden;
  min-height:78px;border-radius:22px;border:1px solid rgba(255,255,255,.10);
  display:flex;align-items:center;justify-content:flex-start;gap:10px;
  padding:16px 16px;font-family:'Black Ops One',cursive;font-size:12px;cursor:pointer;
  transition:transform .18s ease, filter .18s ease, box-shadow .22s ease;
}
.action-btn:active{transform:scale(.985)}
.action-btn:hover{filter:brightness(1.04)}
.action-btn::after{
  content:"";position:absolute;top:0;left:-35%;width:28%;height:100%;
  transform:skewX(-20deg);
  animation:shine 2.6s linear infinite;
}
@keyframes shine{0%{left:-35%}100%{left:120%}}
@keyframes pulseBlue{0%,100%{box-shadow:0 0 12px rgba(59,130,246,.22)}50%{box-shadow:0 0 22px rgba(59,130,246,.40)}}
@keyframes pulseGreen{0%,100%{box-shadow:0 0 12px rgba(34,197,94,.22)}50%{box-shadow:0 0 22px rgba(34,197,94,.40)}}
@keyframes pulseOrange{0%,100%{box-shadow:0 0 12px rgba(249,115,22,.22)}50%{box-shadow:0 0 22px rgba(249,115,22,.40)}}
@keyframes pulseGold{0%,100%{box-shadow:0 0 12px rgba(212,175,55,.22)}50%{box-shadow:0 0 22px rgba(212,175,55,.40)}}
.btn-cadastro{
  background:linear-gradient(135deg,#8b6a14 0%, #d4af37 50%, #8b6a14 100%);
  color:#000; border-color:rgba(245,211,106,.45); animation:pulseGold 2.1s infinite;
}
.btn-cadastro::after{background:linear-gradient(90deg,transparent,rgba(255,248,210,.26),transparent)}
.btn-ps2{
  background:linear-gradient(135deg,#314c1b 0%, #5d7a37 50%, #314c1b 100%);
  color:#fff; border-color:rgba(143,184,90,.45); animation:pulseGreen 2.1s infinite;
}
.btn-ps2::after{background:linear-gradient(90deg,transparent,rgba(210,232,171,.24),transparent)}
.btn-x360{
  background:linear-gradient(135deg,#0f274f 0%, #1d4a93 50%, #0f274f 100%);
  color:#fff; border-color:rgba(96,165,250,.45); animation:pulseBlue 2.1s infinite;
}
.btn-x360::after{background:linear-gradient(90deg,transparent,rgba(173,216,255,.22),transparent)}
.btn-others{
  background:linear-gradient(135deg,#4a1d0f 0%, #8a3d1a 50%, #4a1d0f 100%);
  color:#fff; border-color:rgba(251,146,60,.45); animation:pulseOrange 2.1s infinite;
}
.btn-others::after{background:linear-gradient(90deg,transparent,rgba(255,208,163,.22),transparent)}
.btn-backup{
  background:linear-gradient(135deg,#5b3f11 0%, #8f6c17 50%, #5b3f11 100%);
  color:#fff; border-color:rgba(245,211,106,.35); animation:pulseGold 2.1s infinite;
  grid-column:1 / -1;
}
.btn-backup::after{background:linear-gradient(90deg,transparent,rgba(255,248,210,.22),transparent)}
.action-btn i{width:21px;height:21px;flex-shrink:0}

.monitor-title{
  text-align:center;margin:18px 0 10px;color:var(--gold);font-size:11px;letter-spacing:.12em;
}
.stats-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:12px;
}
.stat-card{
  border-radius:20px;padding:16px 16px;min-height:86px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  border:1px solid rgba(255,255,255,.10);
}
.stat-left{display:flex;align-items:center;gap:10px}
.stat-left i{width:20px;height:20px}
.stat-label{font-family:'Black Ops One',cursive;font-size:11px;line-height:1.15}
.stat-value{font-family:'Black Ops One',cursive;font-size:30px;line-height:1}
.card-blue{background:linear-gradient(145deg,#0d1a2d 0%, #0a1520 100%);border-color:rgba(59,130,246,.30);box-shadow:0 0 16px rgba(59,130,246,.08)}
.card-green{background:linear-gradient(145deg,#0d1f0d 0%, #0a1a0a 100%);border-color:rgba(34,197,94,.30);box-shadow:0 0 16px rgba(34,197,94,.08)}
.card-orange{background:linear-gradient(145deg,#2d1a0d 0%, #20150a 100%);border-color:rgba(249,115,22,.30);box-shadow:0 0 16px rgba(249,115,22,.08)}
.card-gold{background:linear-gradient(145deg,#1f1f0d 0%, #1a1a0a 100%);border-color:rgba(234,179,8,.30);box-shadow:0 0 16px rgba(234,179,8,.08)}

.section-card{
  background:linear-gradient(180deg,#151515,#101010);
  border:1px solid rgba(255,255,255,.05);border-radius:20px;padding:14px;margin-top:14px;
}
.section-card h2{margin:0 0 12px;color:#f4d77b;font-size:18px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field{grid-column:span 2}.field.half{grid-column:span 1}
label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
input,select{
  width:100%;background:#0f0f0f;border:1.5px solid rgba(255,255,255,.08);color:#fff;border-radius:14px;padding:12px;font-size:16px;outline:none
}
input:focus,select:focus{border-color:#d4af37;box-shadow:0 0 0 3px rgba(212,175,55,.1)}
.toolbar,.switcher,.card-actions,.topline{display:flex;gap:10px;flex-wrap:wrap}
.btn{
  border:none;border-radius:14px;padding:12px 14px;cursor:pointer;
}
.btn-primary{background:linear-gradient(135deg,#b8860b 0%, #d4af37 50%, #b8860b 100%);color:#000;font-family:'Black Ops One',cursive}
.btn-secondary{background:#151515;color:#fff;border:1px solid rgba(255,255,255,.08)}
.switcher{margin-bottom:14px}
.switch-btn{
  border:none;background:#121212;color:#ddd;border-radius:999px;padding:11px 15px;border:1px solid rgba(255,255,255,.08);cursor:pointer;font-weight:700
}
.switch-btn.active{background:rgba(212,175,55,.15);color:#f4d77b;border-color:rgba(212,175,55,.35)}
.platform-view{display:none}.platform-view.active{display:block}
.platform-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:14px;padding:12px 14px;border-radius:18px;background:#0c0c0c;border:1px solid rgba(255,255,255,.05)}
.platform-head h3{margin:0;color:var(--gold);font-size:20px}
.platform-head span{color:var(--muted);font-size:12px}
.games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px}
.game-card{background:linear-gradient(180deg,#111,#0a0a0a);border:1px solid rgba(255,255,255,.05);border-radius:20px;padding:14px;position:relative;overflow:hidden}
.game-card::before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(212,175,55,.08),transparent 38%);pointer-events:none}
.game-title{font-size:19px;font-family:'Black Ops One',cursive;color:#f4d77b;margin:0;padding-right:72px}
.rating-badge{min-width:58px;text-align:center;padding:8px 10px;border-radius:14px;background:rgba(212,175,55,.16);border:1px solid rgba(212,175,55,.30);color:#d4af37;font-family:'Black Ops One',cursive}
.rating-badge small{display:block;font-size:10px;color:#fff;opacity:.75;font-family:'Inter',sans-serif}
.status-pill{display:inline-block;padding:7px 10px;border-radius:999px;font-size:11px;font-family:'Black Ops One',cursive;margin-bottom:8px;border:1px solid transparent}
.status-backlog{background:rgba(120,120,120,.15);color:#d7d7d7;border-color:rgba(255,255,255,.10)}
.status-jogando{background:rgba(46,125,80,.18);color:#9ff0b6;border-color:rgba(46,125,80,.35)}
.status-zerado{background:rgba(212,175,55,.18);color:#d4af37;border-color:rgba(212,175,55,.30)}
.info-row{display:flex;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.info-row:last-child{border-bottom:none}
.info-label{font-size:12px;color:var(--muted)} .info-value{font-weight:700;text-align:right}
@media (max-width:760px){
  .form-grid{grid-template-columns:1fr}
  .field,.field.half{grid-column:span 1}
}
</style>
</head>
<body>
<div class="app">
  <div class="view active" id="view-dashboard">
    <section class="hero">
      <div class="logo-wrap"><img src="logo.png" alt="Logo"></div>
      <h1 class="font-usarmy">ALCANTARA GAMES</h1>
      <p>CATÁLOGO PESSOAL</p>

      <div class="action-grid">
        <button class="action-btn btn-cadastro" onclick="switchView('cadastro')"><i data-lucide="plus-circle"></i><span>CADASTRO</span></button>
        <button class="action-btn btn-ps2" onclick="openPlatform('PS2')"><i data-lucide="shield-check"></i><span>PS2</span></button>
        <button class="action-btn btn-x360" onclick="openPlatform('Xbox 360')"><i data-lucide="gamepad-2"></i><span>XBOX 360</span></button>
        <button class="action-btn btn-others" onclick="openPlatform('Outros')"><i data-lucide="layers-3"></i><span>OUTRAS PLATAFORMAS</span></button>
      </div>

      <div class="monitor-title font-usarmy">MONITORAMENTO OPERACIONAL</div>

      <div class="stats-grid">
        <div class="stat-card card-blue">
          <div class="stat-left">
            <i data-lucide="circle-dot" style="color:#60a5fa"></i>
            <div class="stat-label" style="color:#60a5fa">TOTAL</div>
          </div>
          <div class="stat-value" style="color:#60a5fa" id="statTotal">0</div>
        </div>

        <div class="stat-card card-green">
          <div class="stat-left">
            <i data-lucide="shield-check" style="color:#4ade80"></i>
            <div class="stat-label" style="color:#4ade80">PS2</div>
          </div>
          <div class="stat-value" style="color:#4ade80" id="statPS2">0</div>
        </div>

        <div class="stat-card card-blue">
          <div class="stat-left">
            <i data-lucide="gamepad-2" style="color:#60a5fa"></i>
            <div class="stat-label" style="color:#60a5fa">XBOX 360</div>
          </div>
          <div class="stat-value" style="color:#60a5fa" id="statX360">0</div>
        </div>

        <div class="stat-card card-orange">
          <div class="stat-left">
            <i data-lucide="layers-3" style="color:#fb923c"></i>
            <div class="stat-label" style="color:#fb923c">OUTRAS</div>
          </div>
          <div class="stat-value" style="color:#fb923c" id="statOutros">0</div>
        </div>
      </div>

      <div style="margin-top:12px">
        <button class="action-btn btn-backup" style="width:100%;min-height:72px;justify-content:center" onclick="exportBackup()"><i data-lucide="download"></i><span>BACKUP</span></button>
      </div>
    </section>
  </div>

  <div class="view" id="view-cadastro">
    <section class="section-card">
      <h2 class="font-usarmy">Cadastro do jogo</h2>
      <div class="toolbar" style="margin-bottom:12px">
        <button class="btn btn-secondary" onclick="switchView('dashboard')">Voltar</button>
      </div>
      <div class="form-grid">
        <div class="field half"><label for="title">Título</label><input id="title" placeholder="Digite o título do jogo"></div>
        <div class="field half"><label for="platform">Plataforma</label><select id="platform"><option>PS2</option><option>Xbox 360</option><option>PS3</option><option>PC</option><option>Outros</option></select></div>
        <div class="field half"><label for="category">Categoria</label><select id="category"><option>Ação</option><option>Aventura</option><option>Corrida</option><option>Esporte</option><option>FPS</option><option>Luta</option><option>RPG</option><option>Survival Horror</option><option>Estratégia</option><option>Outro</option></select></div>
        <div class="field half"><label for="status">Status</label><select id="status"><option>Backlog</option><option>Jogando</option><option>Zerado</option></select></div>
        <div class="field"><label for="rating">Nota 0/10</label><input id="rating" type="number" min="0" max="10" step="0.1" placeholder="Ex.: 8.5"></div>
        <div class="field">
          <div class="toolbar">
            <button class="btn btn-primary" id="saveBtn" type="button">Salvar jogo</button>
            <button class="btn btn-secondary hidden" id="cancelEdit" type="button">Cancelar edição</button>
            <button class="btn btn-secondary" id="btnImport" type="button">Restaurar</button>
            <input id="importFile" type="file" accept=".json,application/json" class="hidden">
          </div>
        </div>
      </div>
    </section>
  </div>

  <div class="view" id="view-biblioteca">
    <section class="section-card">
      <h2 class="font-usarmy">Plataformas</h2>
      <div class="toolbar" style="margin-bottom:12px">
        <button class="btn btn-secondary" onclick="switchView('dashboard')">Voltar</button>
      </div>
      <div class="switcher" id="platformSwitcher"></div>
      <div id="platformPanels"></div>
    </section>
  </div>
</div>

<script>
const STORAGE_KEY = "alcantara_games_dashboard_clean_v1";
const PLATFORMS = ["PS2","Xbox 360","PS3","PC","Outros"];
const state = { games: [], editingId: null, activePlatform: "PS2" };
const el = id => document.getElementById(id);

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
function normalize(t=""){ return String(t).trim().toLowerCase(); }
function loadGames(){ try { state.games = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); } catch { state.games = []; } }
function persist(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state.games)); }

function switchView(view, pushState = true){
  ["dashboard","cadastro","biblioteca"].forEach(v => el("view-"+v).classList.toggle("active", v === view));
  if (pushState) {
    try {
      history.pushState({view}, "", "#"+view);
    } catch(e) {}
  }
  window.scrollTo({top:0,behavior:"smooth"});
}
window.switchView = switchView;

window.addEventListener("popstate", () => {
  if (document.getElementById("view-biblioteca").classList.contains("active") || document.getElementById("view-cadastro").classList.contains("active")) {
    switchView("dashboard");
  }
});


function openPlatform(platform){
  state.activePlatform = platform;
  switchView("biblioteca");
  renderBiblioteca();
}
window.openPlatform = openPlatform;

function getFormData(){
  const old = state.games.find(g => g.id === state.editingId) || {};
  return {
    id: state.editingId || uid(),
    title: el("title").value.trim(),
    platform: el("platform").value,
    category: el("category").value,
    status: el("status").value,
    rating: el("rating").value.trim(),
    createdAt: old.createdAt || Date.now(),
    updatedAt: Date.now()
  };
}
function clearForm(){
  state.editingId = null;
  el("saveBtn").textContent = "Salvar jogo";
  el("cancelEdit").classList.add("hidden");
  el("title").value = "";
  el("platform").value = "PS2";
  el("category").value = "Ação";
  el("status").value = "Backlog";
  el("rating").value = "";
}
function fillForm(game){
  state.editingId = game.id;
  el("saveBtn").textContent = "Atualizar jogo";
  el("cancelEdit").classList.remove("hidden");
  el("title").value = game.title || "";
  el("platform").value = game.platform || "PS2";
  el("category").value = game.category || "Ação";
  el("status").value = game.status || "Backlog";
  el("rating").value = game.rating || "";
  switchView("cadastro");
}
function saveGame(){
  const data = getFormData();
  if(!data.title) return alert("Digite o título do jogo.");
  if(data.rating){
    const r = Number(data.rating);
    if(Number.isNaN(r) || r < 0 || r > 10) return alert("A nota deve ficar entre 0 e 10.");
  }
  const duplicate = state.games.find(g => normalize(g.title) === normalize(data.title) && g.platform === data.platform && g.id !== data.id);
  if(duplicate) return alert("Esse jogo já está cadastrado nessa plataforma.");
  const idx = state.games.findIndex(g => g.id === data.id);
  if(idx >= 0) state.games[idx] = data; else state.games.unshift(data);
  state.activePlatform = data.platform;
  persist(); clearForm(); render(); switchView("dashboard");
}
function removeGame(id){
  const game = state.games.find(g => g.id === id);
  if(!game) return;
  if(!confirm(`Excluir "${game.title}"?`)) return;
  state.games = state.games.filter(g => g.id !== id);
  persist(); render();
}
function editGame(id){ const game = state.games.find(g => g.id === id); if(game) fillForm(game); }
window.editGame = editGame; window.removeGame = removeGame;

function exportBackup(){
  const blob = new Blob([JSON.stringify(state.games, null, 2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "alcantara-games-catalogo.json";
  a.click();
  URL.revokeObjectURL(a.href);
}
window.exportBackup = exportBackup;

function importBackup(file){
  const reader = new FileReader();
  reader.onload = (e) => {
    try{
      const data = JSON.parse(e.target.result);
      if(!Array.isArray(data)) throw new Error();
      state.games = data; persist(); render(); alert("Backup restaurado com sucesso.");
    }catch{ alert("Arquivo inválido."); }
  };
  reader.readAsText(file);
}
function statusClass(status){
  if(status === "Jogando") return "status-jogando";
  if(status === "Zerado") return "status-zerado";
  return "status-backlog";
}
function formatRating(rating){ return rating ? String(rating).replace(".", ",") : "-"; }

function renderStats(){
  el("statTotal").textContent = state.games.length;
  el("statPS2").textContent = state.games.filter(g => g.platform === "PS2").length;
  el("statX360").textContent = state.games.filter(g => g.platform === "Xbox 360").length;
  el("statOutros").textContent = state.games.filter(g => !["PS2","Xbox 360"].includes(g.platform)).length;
}
function renderSwitcher(){
  el("platformSwitcher").innerHTML = PLATFORMS.map(platform => `<button class="switch-btn ${state.activePlatform === platform ? "active" : ""}" onclick="openPlatform('${platform}')">${platform} (${state.games.filter(g => g.platform === platform).length})</button>`).join("");
}
function gameCard(game){
  return `<article class="game-card">
    <div class="topline">
      <div>
        <div class="status-pill ${statusClass(game.status)}">${game.status}</div>
        <h3 class="game-title">${game.title}</h3>
      </div>
      <div class="rating-badge"><small>NOTA</small>${formatRating(game.rating)}</div>
    </div>
    <div class="info-row"><span class="info-label">Plataforma</span><span class="info-value">${game.platform}</span></div>
    <div class="info-row"><span class="info-label">Categoria</span><span class="info-value">${game.category}</span></div>
    <div class="info-row"><span class="info-label">Status</span><span class="info-value">${game.status}</span></div>
    <div class="info-row"><span class="info-label">Nota</span><span class="info-value">${formatRating(game.rating)}</span></div>
    <div class="card-actions" style="margin-top:12px">
      <button class="btn btn-secondary" onclick="editGame('${game.id}')">Editar</button>
      <button class="btn btn-secondary" onclick="removeGame('${game.id}')">Excluir</button>
    </div>
  </article>`;
}
function renderBiblioteca(){
  renderSwitcher();
  el("platformPanels").innerHTML = PLATFORMS.map(platform => {
    const games = state.games.filter(g => g.platform === platform).sort((a,b) => a.title.localeCompare(b.title, "pt-BR"));
    return `<section class="platform-view ${state.activePlatform === platform ? "active" : ""}" style="display:${state.activePlatform === platform ? "block" : "none"}">
      <div class="platform-head"><h3 class="font-usarmy">${platform}</h3><span>${games.length} jogo(s) cadastrados</span></div>
      ${games.length ? `<div class="games-grid">${games.map(gameCard).join("")}</div>` : `<div class="section-card">Nenhum jogo cadastrado em ${platform}.</div>`}
    </section>`;
  }).join("");
  lucide.createIcons();
}
function render(){ renderStats(); renderBiblioteca(); lucide.createIcons(); }
function bind(){
  el("saveBtn").addEventListener("click", saveGame);
  el("cancelEdit").addEventListener("click", clearForm);
  el("btnImport").addEventListener("click", () => el("importFile").click());
  el("importFile").addEventListener("change", (e) => { const file = e.target.files[0]; if(file) importBackup(file); e.target.value = ""; });
}
loadGames(); bind(); render();
try { history.replaceState({view:"dashboard"}, "", "#dashboard"); } catch(e) {}
switchView("dashboard", false);

if("serviceWorker" in navigator){
  window.addEventListener("load", () => navigator.serviceWorker.register("./sw.js"));
}
</script>
</body>
</html>
